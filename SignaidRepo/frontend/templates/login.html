{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5 fade-up">
        <div class="auth-card">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div style="width:52px;height:52px;background:linear-gradient(135deg,#e82a3d,#c41f30);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 20px rgba(232,42,61,0.28);">
                        <svg width="18" height="20" viewBox="0 0 16 20" fill="none">
                            <path d="M8 0L0 3.5V8.5C0 13.2 3.4 17.5 8 20C12.6 17.5 16 13.2 16 8.5V3.5L8 0Z" fill="white"/>
                        </svg>
                    </div>
                    <h2 class="auth-title">Welcome Back</h2>
                    <p class="text-muted" style="font-size:0.95rem;">Log in to your Signaid dashboard</p>
                </div>

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-auth w-100 mb-3">Log In</button>
                </form>

                <div class="auth-divider">or</div>

                <div class="text-center" style="font-size:0.92rem;">
                    <span class="text-muted">New to Signaid?</span>
                    <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold" style="color:#e82a3d;"> Sign up here</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
