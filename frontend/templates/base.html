<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signaid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <div class="sig-logo-box">
                    <svg width="16" height="18" viewBox="0 0 16 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 0L0 3.5V8.5C0 13.2 3.4 17.5 8 20C12.6 17.5 16 13.2 16 8.5V3.5L8 0Z" fill="#ffffff"/>
                    </svg>
                </div>
                Signaid
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="ms-auto d-flex align-items-center gap-2">
                    <button class="dark-mode-btn" onclick="toggleDarkMode()" title="Toggle dark mode">
                        <span class="dark-mode-icon">🌙</span>
                    </button>
                    {% if current_user.is_authenticated %}
                        <a href="{{ url_for('profile') }}" class="nav-link-custom">👤 Profile</a>
                        <a href="{{ url_for('logout') }}" class="nav-link-custom">↳ Log out</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center">
        © 2026 Signaid — Emergency aid for remote communities
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='mapimplementation.js') }}"></script>
    <script src="{{ url_for('static', filename='interact.js') }}"></script>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('.dark-mode-icon');
            const isDark = document.body.classList.contains('dark-mode');
            icon.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('darkMode', isDark ? 'on' : 'off');
        }

        // Load saved preference
        if (localStorage.getItem('darkMode') === 'on') {
            document.body.classList.add('dark-mode');
            document.querySelector('.dark-mode-icon').textContent = '☀️';
        }
    </script>
</body>
</html>
